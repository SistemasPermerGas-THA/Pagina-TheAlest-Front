<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | THE ALEST - Midnight Concept</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:ital,wght@1,400&family=Alex+Brush&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        alest: {
                            dark: '#0C1720',
                            wood: '#896C49',
                            gold: '#DEB175',
                            linen: '#EDE6E2',
                            white: '#E3DFD6',
                        }
                    },
                    fontFamily: {
                        serif: ['"Times New Roman"', 'Times', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                        italic: ['"Playfair Display"', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0C1720; color: #EDE6E2; font-family: 'Inter', sans-serif; }
        .text-title-caps { font-family: '"Times New Roman"', Times, serif; text-transform: uppercase; letter-spacing: 0.15em; }
        .border-gold-thin { border-color: rgba(222, 177, 117, 0.2); }
    </style>
</head>

<body class="antialiased overflow-x-hidden">
    <nav class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-6 md:px-12 bg-alest-dark/95 backdrop-blur-md border-b border-gold-thin">
        <a href="../option5.html" class="text-title-caps text-2xl text-alest-gold">THE ALEST</a>
        <div class="hidden md:flex gap-12 text-body-caps text-[10px] uppercase tracking-widest">
            <a href="vision.html" class="hover:text-alest-gold transition-colors">Vision</a>
            <a href="collection.html" class="hover:text-alest-gold transition-colors">Collection</a>
            <a href="location.html" class="hover:text-alest-gold transition-colors">Location</a>
            <a href="contact.html" class="text-alest-gold">Contact</a>
        </div>
        <a href="#" class="text-body-caps text-[10px] border border-alest-gold/30 px-6 py-3 hover:bg-alest-gold hover:text-alest-dark transition-colors uppercase tracking-widest">Reserve</a>
    </nav>

    <main class="pt-40 pb-20 max-w-7xl mx-auto px-6 md:px-12">
        <div class="grid lg:grid-cols-12 gap-16 items-start">
            <div class="lg:col-span-5 space-y-12">
                <h1 class="text-title-caps text-5xl md:text-8xl text-alest-white">Contact</h1>
                <p class="text-lg font-light text-alest-linen/40 max-w-sm">DEDICATED SERVICE FOR THE DISCERNING TRAVELER. OUR TEAM IS AVAILABLE 24/7.</p>
                <div class="space-y-6">
                    <div class="flex flex-col gap-2">
                        <span class="text-[10px] text-alest-gold tracking-[0.3em] uppercase">Phone</span>
                        <p class="text-3xl font-serif text-alest-white">+52 55 9027 7343</p>
                    </div>
                    <div class="flex flex-col gap-2">
                        <span class="text-[10px] text-alest-gold tracking-[0.3em] uppercase">Email</span>
                        <p class="text-3xl font-serif text-alest-white">concierge@thealest.com</p>
                    </div>
                </div>
            </div>
            <div class="lg:col-span-7 bg-[#111f2c] p-12 border border-gold-thin">
                <form class="space-y-8">
                    <input type="text" placeholder="NAME" class="w-full bg-transparent border-b border-gold-thin py-4 text-[10px] tracking-widest text-alest-white outline-none focus:border-alest-gold transition-colors">
                    <input type="email" placeholder="EMAIL" class="w-full bg-transparent border-b border-gold-thin py-4 text-[10px] tracking-widest text-alest-white outline-none focus:border-alest-gold transition-colors">
                    <textarea rows="4" placeholder="MESSAGE" class="w-full bg-transparent border-b border-gold-thin py-4 text-[10px] tracking-widest text-alest-white outline-none focus:border-alest-gold transition-colors"></textarea>
                    <button class="w-full bg-alest-gold text-alest-dark py-6 text-[10px] font-bold tracking-[0.4em] uppercase hover:bg-alest-white transition-colors">Send Inquiry</button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
