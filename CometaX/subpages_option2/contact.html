<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | THE ALEST - Option 2</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/iconify-icon@1.0.7/dist/iconify-icon.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&family=Alex+Brush&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        alest: {
                            dark: '#0C1720',
                            wood: '#896C49',
                            gold: '#DEB175',
                            linen: '#EDE6E2',
                            white: '#E3DFD6',
                        }
                    },
                    fontFamily: {
                        serif: ['"Times New Roman"', 'Times', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                        italic: ['"Playfair Display"', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0C1720; color: #EDE6E2; font-family: 'Inter', sans-serif; }
        .text-title-caps { font-family: '"Times New Roman"', Times, serif; text-transform: uppercase; letter-spacing: 0.22em; }
    </style>
</head>

<body class="antialiased overflow-x-hidden">
    <nav class="fixed top-0 w-full z-50 bg-alest-dark/80 backdrop-blur-md border-b border-white/10 px-6 py-6">
        <div class="max-w-[1920px] mx-auto flex justify-between items-center">
            <a href="../option2.html" class="flex flex-col">
                <span class="text-2xl font-serif text-alest-gold uppercase tracking-widest">The Alest</span>
            </a>
            <div class="hidden md:flex gap-12 text-[10px] uppercase tracking-[0.2em]">
                <a href="history.html" class="hover:text-alest-gold transition-colors">History</a>
                <a href="essence.html" class="hover:text-alest-gold transition-colors">Essence</a>
                <a href="rooms.html" class="hover:text-alest-gold transition-colors">Rooms</a>
                <a href="location.html" class="hover:text-alest-gold transition-colors">Location</a>
                <a href="contact.html" class="text-alest-gold">Contact</a>
            </div>
            <a href="#" class="border border-white/30 px-6 py-2 rounded-full text-[10px] uppercase tracking-widest hover:bg-white hover:text-black transition-all">Reserve</a>
        </div>
    </nav>

    <main class="pt-40 pb-20 px-6 max-w-7xl mx-auto">
        <div class="grid lg:grid-cols-2 gap-20">
            <div>
                <h1 class="text-title-caps text-5xl md:text-7xl text-white mb-8">Contact</h1>
                <p class="text-lg font-light text-alest-linen/60 mb-12">Our concierge service is at your disposal for any special requests.</p>
                <div class="space-y-6">
                    <div class="flex items-center gap-4">
                        <iconify-icon icon="solar:phone-bold" class="text-2xl text-alest-gold"></iconify-icon>
                        <span class="text-xl font-light">+52 55 9027 7343</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <iconify-icon icon="solar:letter-bold" class="text-2xl text-alest-gold"></iconify-icon>
                        <span class="text-xl font-light">concierge@thealest.com</span>
                    </div>
                </div>
            </div>
            <form class="space-y-6">
                <input type="text" placeholder="NAME" class="w-full bg-transparent border-b border-white/20 py-4 outline-none focus:border-alest-gold transition-colors tracking-widest text-[10px]">
                <input type="email" placeholder="EMAIL" class="w-full bg-transparent border-b border-white/20 py-4 outline-none focus:border-alest-gold transition-colors tracking-widest text-[10px]">
                <textarea rows="4" placeholder="MESSAGE" class="w-full bg-transparent border-b border-white/20 py-4 outline-none focus:border-alest-gold transition-colors tracking-widest text-[10px]"></textarea>
                <button class="bg-alest-gold text-alest-dark px-12 py-4 text-[10px] font-bold uppercase tracking-widest hover:bg-white transition-colors">Send</button>
            </form>
        </div>
    </main>
</body>
</html>
