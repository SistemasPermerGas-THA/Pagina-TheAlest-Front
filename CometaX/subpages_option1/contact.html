<!DOCTYPE html>
<html lang="en" class="antialiased">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | THE ALEST - Option 1</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,400&family=Alex+Brush&display=swap" rel="stylesheet">

    <style>
        :root {
            --c-bg: #EDE6E2;
            --c-dark: #0C1720;
            --c-accent: #896C49;
            --c-accent-light: #DEB175;
            --font-display: 'Times New Roman', Times, serif;
            --font-body: 'Inter', sans-serif;
        }

        body {
            background-color: var(--c-bg);
            color: var(--c-dark);
            font-family: var(--font-body);
            margin: 0;
        }

        .display-font {
            font-family: var(--font-display);
            text-transform: uppercase;
            letter-spacing: 0.22em;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="fixed top-0 w-full px-6 py-8 md:px-12 flex justify-between items-center z-50 text-alest-dark transition-all duration-500 bg-white/50 backdrop-blur-md border-b border-alest-dark/5">
        <div class="flex items-center">
            <a href="../option1.html" class="display-font text-2xl md:text-3xl tracking-[0.2em]">THE ALEST</a>
        </div>
        <div class="hidden md:flex gap-12 text-[10px] uppercase tracking-widest">
            <a href="history.html" class="hover:text-alest-gold">History</a>
            <a href="essence.html" class="hover:text-alest-gold">Essence</a>
            <a href="rooms.html" class="hover:text-alest-gold">Rooms</a>
            <a href="location.html" class="hover:text-alest-gold">Location</a>
            <a href="contact.html" class="text-alest-gold">Contact</a>
        </div>
        <a href="#" class="border border-alest-dark/30 px-6 py-3 text-[10px] uppercase tracking-widest hover:bg-alest-dark hover:text-white transition-all">
            Reserve
        </a>
    </nav>

    <main class="pt-40 pb-20 px-6 md:px-12">
        <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-16">
            <div>
                <h1 class="display-font text-5xl md:text-7xl mb-8">Contact Us</h1>
                <p class="text-lg font-light text-alest-dark/70 leading-relaxed mb-12">
                    Our concierge service is at your disposal for any special requests, bookings, or inquiries.
                </p>
                <div class="space-y-8">
                    <div>
                        <span class="text-[10px] uppercase tracking-widest text-alest-gold block mb-2">Email</span>
                        <a href="mailto:concierge@thealest.com" class="text-2xl font-light hover:text-alest-accent transition-colors">concierge@thealest.com</a>
                    </div>
                    <div>
                        <span class="text-[10px] uppercase tracking-widest text-alest-gold block mb-2">Phone</span>
                        <a href="tel:+525590277343" class="text-2xl font-light hover:text-alest-accent transition-colors">+52 55 9027 7343</a>
                    </div>
                </div>
            </div>
            
            <form class="space-y-6 bg-white p-8 md:p-12 shadow-xl border border-alest-dark/5">
                <div class="grid grid-cols-2 gap-6">
                    <input type="text" placeholder="NAME" class="bg-transparent border-b border-alest-dark/20 py-4 text-[10px] tracking-widest focus:border-alest-gold outline-none uppercase">
                    <input type="email" placeholder="EMAIL" class="bg-transparent border-b border-alest-dark/20 py-4 text-[10px] tracking-widest focus:border-alest-gold outline-none uppercase">
                </div>
                <textarea rows="4" placeholder="MESSAGE" class="w-full bg-transparent border-b border-alest-dark/20 py-4 text-[10px] tracking-widest focus:border-alest-gold outline-none uppercase"></textarea>
                <button type="submit" class="w-full bg-alest-dark text-white py-6 text-[10px] tracking-widest hover:bg-alest-accent transition-all uppercase">Send Message</button>
            </form>
        </div>
    </main>
</body>

</html>
