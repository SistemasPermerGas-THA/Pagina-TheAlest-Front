<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | THE ALEST - Option 3</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=Playfair+Display:ital,wght@0,400;1,400&family=Alex+Brush&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        alest: {
                            dark: '#0C1720',
                            wood: '#896C49',
                            gold: '#DEB175',
                            linen: '#EDE6E2',
                            white: '#E3DFD6',
                        }
                    },
                    fontFamily: {
                        serif: ['"Times New Roman"', 'Times', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                        italic: ['"Playfair Display"', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #EDE6E2; color: #0C1720; font-family: 'Inter', sans-serif; }
        .text-title-caps { font-family: '"Times New Roman"', Times, serif; text-transform: uppercase; letter-spacing: 0.22em; }
    </style>
</head>

<body class="antialiased overflow-x-hidden">
    <nav class="fixed top-0 w-full z-50 bg-white/30 backdrop-blur-md border-b border-black/5 px-6 py-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="../option3.html" class="text-3xl font-serif text-alest-gold uppercase tracking-widest">The Alest</a>
            <div class="hidden md:flex gap-12 text-[10px] uppercase tracking-[0.2em]">
                <a href="vision.html" class="hover:text-alest-gold transition-colors">Vision</a>
                <a href="collection.html" class="hover:text-alest-gold transition-colors">Collection</a>
                <a href="location.html" class="hover:text-alest-gold transition-colors">Location</a>
                <a href="contact.html" class="text-alest-gold">Contact</a>
            </div>
            <a href="#" class="border border-black/10 px-8 py-3 text-[10px] uppercase tracking-widest hover:bg-black hover:text-white transition-all">Reserve</a>
        </div>
    </nav>

    <main class="pt-60 pb-40 max-w-4xl mx-auto px-6 text-center">
        <h1 class="text-title-caps text-5xl md:text-7xl mb-12">Contact Us</h1>
        <p class="text-xl font-light text-alest-dark/70 mb-16 leading-relaxed">We are here to assist you with every detail of your stay.</p>
        
        <div class="grid md:grid-cols-2 gap-16 text-left">
            <div class="space-y-8">
                <div>
                    <span class="text-[10px] uppercase tracking-widest text-alest-gold block mb-2">Phone</span>
                    <p class="text-2xl font-light">+52 55 9027 7343</p>
                </div>
                <div>
                    <span class="text-[10px] uppercase tracking-widest text-alest-gold block mb-2">Email</span>
                    <p class="text-2xl font-light">concierge@thealest.com</p>
                </div>
            </div>
            <form class="space-y-6">
                <input type="text" placeholder="NAME" class="w-full bg-transparent border-b border-black/10 py-4 outline-none focus:border-alest-gold transition-colors text-[10px] tracking-widest">
                <input type="email" placeholder="EMAIL" class="w-full bg-transparent border-b border-black/10 py-4 outline-none focus:border-alest-gold transition-colors text-[10px] tracking-widest">
                <button class="w-full bg-alest-dark text-white py-4 text-[10px] tracking-widest uppercase hover:bg-alest-gold transition-colors">Send Inquiry</button>
            </form>
        </div>
    </main>
</body>
</html>
